name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IDASDK_DIR: idasdk

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            generator: "Visual Studio 17 2022"
            cmake_extra: "-A x64"
            artifact: hexagon-windows
          - os: macos-latest
            generator: Ninja
            cmake_extra: ""
            artifact: hexagon-macos-arm64
          - os: ubuntu-latest
            generator: Ninja
            cmake_extra: ""
            artifact: hexagon-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: hexagon-src

      - name: Clone IDA SDK
        shell: bash
        run: git clone --recursive --depth 1 https://github.com/HexRaysSA/ida-sdk.git ${{ env.IDASDK_DIR }}

      - name: Inject hexagon module
        shell: bash
        run: |
          cp -r hexagon-src/hexagon ${{ env.IDASDK_DIR }}/src/module/hexagon
          echo 'add_subdirectory(hexagon)' >> ${{ env.IDASDK_DIR }}/src/module/CMakeLists.txt

      - name: Setup Visual Studio
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Configure
        shell: bash
        working-directory: ${{ env.IDASDK_DIR }}/src
        env:
          IDASDK: ${{ github.workspace }}/${{ env.IDASDK_DIR }}
        run: cmake -B build -G "${{ matrix.generator }}" ${{ matrix.cmake_extra }}

      - name: Build hexagon module
        shell: bash
        working-directory: ${{ env.IDASDK_DIR }}/src
        run: cmake --build build --target hexagon --config Release --parallel

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p out
          find ${{ env.IDASDK_DIR }}/src/bin -name "hexagon*" -type f -exec cp {} out/ \;
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/
